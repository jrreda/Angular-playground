<app-header />

<!-- single user -->
<menu class="users" role="listbox">
  @for (user of users(); track user.id) {
    <li role="option">
      <app-user [name]="user.name" [id]="user.id" (select)="onSelectUser($event)" />
    </li>
  } @empty {
    <li>No users found</li>
  }
</menu>

<!-- tasks -->
<app-tasks [name]="selectedUser.name" />
