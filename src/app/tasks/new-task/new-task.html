<div class="backdrop"></div>
<dialog open>
  <h2>Add Task</h2>
  <form (submit)="onCreateTask()">
    <p>
      <label for="title">Title</label>
      <input type="text" id="title" name="title" [(ngModel)]="title" />
    </p>

    <p>
      <label for="summary">Summary</label>
      <textarea id="summary" rows="5" name="summary" [(ngModel)]="summary"></textarea>
    </p>

    <p>
      <label for="due-date">Due Date</label>
      <input type="date" id="due-date" name="due-date" [(ngModel)]="dueDate" />
    </p>

    <p class="actions">
      <button type="button" (click)="onClose()">Close</button>
      <button type="submit" [disabled]="title.length === 0 || summary.length === 0 || dueDate.length === 0">Create</button>
    </p>
  </form>
</dialog>
