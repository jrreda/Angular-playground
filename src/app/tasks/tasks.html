<section id="tasks">
  <header>
    <h2>{{ name }}'s tasks</h2>
    <menu>
      <button>Add New</button>
    </menu>
  </header>

  <ul>
    @for (task of filteredTasks; track task.id) {
      <li>
        <app-task [task]="task" />
      </li>
    } @empty {
      <li>No tasks for {{ name }} found</li>
    }
  </ul>
</section>
